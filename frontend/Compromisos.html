<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agenda de Compromisos</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <!-- =======================
       HEADER / NAVBAR
  ======================== -->
  <header class="topbar">
    <div class="brand">
      <img class="brand__logo" src="./logo1.png" alt="Logo Hesego" />
      <div class="brand__text">
        <div class="brand__title">Agenda de Compromisos</div>
        <div class="brand__subtitle">Hesego Ingeniería S.A.S</div>
      </div>
    </div>

    <nav class="topnav">
      <a class="navlink" href="./agenda.html">Programación Reuniones</a>
      <a class="navlink" href="./Checklist.html">Checklist</a>
      <a class="navlink" href="./index.html">Registrar Compromiso</a>
      <button id="btn-recargar" class="btn btn--ghost" type="button" title="Recargar lista">
        ⟲ Recargar
      </button>
    </nav>
  </header>
  <div class="layout">
    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
      <!-- Panel filtros -->
      <section class="panel">
        <div class="panel__title">Filtros</div>

        <div class="field">
          <label for="filtro_contrato">Contrato</label>
          <select id="filtro_contrato"></select>
        </div>

        <div class="field">
          <label for="filtro_estado">Estado (múltiple)</label>
          <select id="filtro_estado" multiple>
            <option value="Pendiente">Pendiente</option>
            <option value="Reprogramado">Reprogramado</option>
            <option value="Cerrado">Cerrado</option>
          </select>
          <div class="hint">Tip: Ctrl/Cmd para seleccionar varios.</div>
        </div>

        <div class="field">
          <label for="filtro_responsable">Responsable contiene</label>
          <input id="filtro_responsable" type="text" placeholder="Ej: Jared" />
        </div>

        <div class="field">
          <label for="filtro_atrasado">Atrasado</label>
          <select id="filtro_atrasado">
            <option value="">(Todos)</option>
            <option value="1">Sí</option>
            <option value="0">No</option>
          </select>
        </div>

        <!-- NUEVO: filtro único de fechas (sin desde/hasta) -->
        <div class="panel__subtitle">Filtro de fecha (Día o Mes)</div>

        <div class="grid3">
          <div class="field">
            <label for="date_field">¿Qué fecha?</label>
            <select id="date_field">
              <option value="">(Sin filtro)</option>
              <option value="creacion">Creación</option>
              <option value="entrega">Entrega</option>
              <option value="cierre">Cierre</option>
              <option value="reprog">Reprogramación</option>
            </select>
          </div>

          <div class="field">
            <label for="date_mode">Tipo</label>
            <select id="date_mode">
              <option value="day">Día</option>
              <option value="month">Mes</option>
            </select>
          </div>

          <div class="field">
            <label for="date_value">Valor</label>
            <!-- se cambia dinámicamente entre date y month -->
            <input id="date_value" type="date" />
          </div>
        </div>

        <div class="btnrow">
          <button id="btn-filtrar" class="btn btn--primary" type="button">Aplicar</button>
          <button id="btn-limpiar" class="btn btn--ghost" type="button">Limpiar</button>
        </div>
      </section>

      <!-- Panel acciones -->
      <section class="panel">
        <div class="panel__title">Acciones</div>

        <div class="btncol">
          <button id="btn-exportar" class="btn btn--ghost" type="button">⬇ Exportar Excel</button>

          <button id="btn-importar" class="btn btn--ghost" type="button">⬆ Importar Excel</button>
          <input id="file-import" type="file" accept=".xlsx" style="display:none" />

          <button id="btn-eliminar-seleccionados" class="btn btn--danger" type="button">
            🗑 Eliminar seleccionados
          </button>
        </div>
      </section>
    </aside>
  </div>
